<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Development Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans','Segoe UI',sans-serif; background:#0f1623; color:#e2e8f0; min-height:100vh; }

/* ── COLORS ── */
:root {
  --bg:#0f1623; --card:#1a2235; --card-alt:#1e2a40; --border:#2a3a55;
  --accent:#85b2ff; --green:#34d399; --amber:#fbbf24; --red:#ffaaaa; --purple:#c8b2ff;
  --text:#e2e8f0; --muted:#a8bedb;
  --phase1:#c8b2ff; --phase2:#85b2ff; --phase3:#34d399; --phase4:#fbbf24; --phase5:#ffaaaa;
}

/* ── LAYOUT ── */
.app { padding:24px 28px; max-width:1400px; margin:0 auto; }
.header { margin-bottom:24px; }
.header h1 { font-size:22px; font-weight:900; color:var(--text); letter-spacing:-0.02em; }
.header p { font-size:13px; color:var(--muted); margin-top:2px; }

/* ── TABS ── */
.tab-bar { display:flex; gap:4px; margin-bottom:24px; background:var(--card); padding:4px; border-radius:10px; width:fit-content; border:1px solid var(--border); }
.tab-btn { padding:8px 20px; border-radius:7px; border:none; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.tab-btn.active { background:var(--accent); color:#fff; }
.tab-btn:not(.active) { background:transparent; color:var(--muted); }
.tab-btn:not(.active):hover { color:var(--text); }

/* ── PANEL ── */
.panel { display:none; }
.panel.active { display:block; }

/* ── KANBAN ── */
.kanban-title { font-size:18px; font-weight:800; color:var(--text); margin-bottom:4px; }
.kanban-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }
.kanban-board { display:flex; gap:16px; overflow-x:auto; padding-bottom:16px; }
.kanban-col { min-width:220px; max-width:220px; background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; flex-shrink:0; }
.col-header { padding:12px 14px 10px; }
.col-title { font-size:12px; font-weight:700; line-height:1.3; margin-bottom:6px; }
.col-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.col-meta-text { font-size:11px; color:var(--muted); }
.col-pct { font-size:11px; font-weight:700; }
.progress-bar-wrap { background:rgba(255,255,255,0.1); border-radius:99px; height:5px; overflow:hidden; }
.progress-bar-fill { height:100%; border-radius:99px; transition:width 0.6s ease; }
.col-tasks { padding:0 10px 12px; display:flex; flex-direction:column; gap:6px; max-height:420px; overflow-y:auto; }
.task-card { background:var(--card-alt); border-radius:8px; padding:8px 10px; cursor:pointer; border:1px solid var(--border); transition:all 0.2s; }
.task-card.done { opacity:0.65; border-color:transparent; }
.task-top { display:flex; align-items:flex-start; gap:8px; }
.task-circle { width:16px; height:16px; border-radius:50%; border-width:2px; border-style:solid; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.task-circle.checked { }
.task-check { color:#fff; font-size:9px; font-weight:900; }
.task-text { font-size:11px; line-height:1.4; }
.task-card.done .task-text { text-decoration:line-through; color:var(--muted); }
.role-badge { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-top:6px; display:inline-block; }

/* ── MULTI DASHBOARD ── */
.sprint-selector { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
.sprint-btn { padding:8px 18px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.sprint-btn.active { border-color:var(--accent); background:rgba(133,178,255,0.12); color:var(--accent); }
.sprint-btn-sub { font-size:10px; font-weight:400; margin-top:2px; display:block; }

.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--card); border-radius:10px; padding:14px 16px; border:1px solid var(--border); }
.stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
.stat-val { font-size:28px; font-weight:900; }

.projects-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px; }
.proj-card { background:var(--card); border-radius:10px; padding:12px 14px; border:1px solid var(--border); }
.proj-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.proj-name { font-size:12px; font-weight:800; color:var(--text); }
.proj-code { font-size:10px; color:var(--muted); }
.status-icon { width:22px; height:22px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; flex-shrink:0; }
.phase-chip { font-size:10px; padding:2px 8px; border-radius:4px; background:rgba(133,178,255,0.15); color:var(--accent); display:inline-block; margin-bottom:8px; }
.proj-progress-wrap { margin-bottom:6px; }
.proj-progress-meta { display:flex; justify-content:space-between; margin-bottom:4px; }
.proj-progress-label { font-size:10px; color:var(--muted); }
.proj-progress-pct { font-size:10px; font-weight:700; color:var(--text); }
.proj-deadline { font-size:10px; color:var(--muted); }
.team-badges { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }

.section-card { background:var(--card); border-radius:12px; padding:18px 20px; border:1px solid var(--border); margin-bottom:20px; }
.section-card-title { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:14px; letter-spacing:0.05em; text-transform:uppercase; }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }

/* Gantt */
.gantt-header { display:grid; grid-template-columns:80px 1fr 1fr 1fr 1fr; gap:4px; margin-bottom:6px; }
.gantt-col-label { font-size:10px; font-weight:700; }
.gantt-row { display:grid; grid-template-columns:80px 1fr 1fr 1fr 1fr; gap:4px; margin-bottom:4px; align-items:center; }
.gantt-code { font-size:10px; color:var(--muted); }
.gantt-cell { height:14px; background:var(--border); border-radius:3px; overflow:hidden; }
.gantt-fill { height:100%; border-radius:3px; }
.gantt-legend { display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
.gantt-legend-item { display:flex; align-items:center; gap:4px; }
.gantt-legend-dot { width:10px; height:10px; border-radius:2px; }
.gantt-legend-text { font-size:10px; color:var(--muted); }

/* Util cards */
.util-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
.util-card { background:var(--card); border-radius:10px; padding:12px 14px; border:1px solid var(--border); }
.util-name { font-size:12px; font-weight:700; color:var(--text); }
.util-dot { width:8px; height:8px; border-radius:50%; background:var(--red); }
.util-projects { font-size:18px; font-weight:900; color:var(--text); margin:4px 0; }
.util-label { font-size:11px; font-weight:400; color:var(--muted); }
.util-pct { font-size:10px; color:var(--red); margin-top:4px; }

/* Deadlines */
.deadline-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.deadline-row:last-child { border-bottom:none; }
.dl-code { font-size:12px; font-weight:700; color:var(--text); }
.dl-name { font-size:11px; color:var(--muted); }
.dl-date { font-size:12px; font-weight:700; color:var(--amber); }
.dl-phase { font-size:10px; color:var(--muted); text-align:right; }

canvas { max-height:160px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Course Development Dashboard</h1>

  <div class="tab-bar">

    <div class="stat-grid" id="stat-grid"></div>
    <div style="font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">Projects Overview</div>

    <div class="section-card">
      <div class="section-card-title">Gantt Chart — Timeline Overview</div>
      <div id="gantt-chart"></div>
    </div>
    <div class="two-col">
      <div class="section-card">
        <div class="section-card-title">👥 Team Workload</div>
        <canvas id="bar-chart"></canvas>
      </div>
      <div class="section-card">
        <div class="section-card-title">Projects by Phase</div>
        <div style="display:flex;align-items:center;gap:16px;">
          <canvas id="pie-chart" style="max-width:140px;max-height:140px;"></canvas>
          <div id="pie-legend"></div>
        </div>
      </div>
    </div>
    <div class="util-grid" id="util-grid"></div>
    <div class="section-card">
      <div class="section-card-title">Upcoming Deadlines</div>
      <div id="deadlines"></div>
    </div>
  </div>

</div>

// ── STATE ──
let completedTasks = {};
let activeSprint = "Fall 2023";
let barChart = null;
let pieChart = null;

// ── INIT KANBAN ──
function initKanban() {
  const board = document.getElementById('kanban-board');
  board.innerHTML = '';
  phases.forEach((phase, pi) => {
    const completed = Math.round(phase.tasks.length * kanbanCompletion[pi]);
    phase.tasks.forEach((_, ti) => {
      const key = `${pi}-${ti}`;
      if (!(key in completedTasks)) completedTasks[key] = ti < completed;
    });

    const col = document.createElement('div');
    col.className = 'kanban-col';

    const doneCount = phase.tasks.filter((_,ti) => completedTasks[`${pi}-${ti}`]).length;
    const pct = Math.round(doneCount / phase.tasks.length * 100);

    col.innerHTML = `
      <div class="col-header">
        <div class="col-title" style="color:${phase.color}">${phase.title}</div>
        <div class="col-meta">
          <span class="col-meta-text">${doneCount} of ${phase.tasks.length} completed</span>
          <span class="col-pct" style="color:${phase.color}">${pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%;background:${phase.color}"></div>
        </div>
      </div>
      <div class="col-tasks" id="tasks-${pi}"></div>
    `;
    board.appendChild(col);

    const tasksEl = col.querySelector(`#tasks-${pi}`);
    phase.tasks.forEach((task, ti) => {
      const key = `${pi}-${ti}`;
      const done = completedTasks[key];
      const roleColor = roleColors[task.role] || COLORS.muted;
      const card = document.createElement('div');
      card.className = `task-card${done ? ' done' : ''}`;
      card.style.borderColor = done ? phase.color + '44' : '';
      card.innerHTML = `
        <div class="task-top">
          <div class="task-circle" style="border-color:${phase.color};background:${done ? phase.color : 'transparent'}">
            ${done ? '<span class="task-check">✓</span>' : ''}
          </div>
          <div class="task-text">${task.task}</div>
        </div>
        <div><span class="role-badge" style="background:${roleColor}22;color:${roleColor}">${task.role}</span></div>
      `;
      card.onclick = () => toggleTask(pi, ti);
      tasksEl.appendChild(card);
    });
  });
}

function toggleTask(pi, ti) {
  const key = `${pi}-${ti}`;
  completedTasks[key] = !completedTasks[key];
  initKanban();
}

// ── INIT DASHBOARD ──
function initDashboard() {
  // Sprint selector
  const sel = document.getElementById('sprint-selector');
  sel.innerHTML = '';
  Object.entries(sprintData).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = `sprint-btn${key === activeSprint ? ' active' : ''}`;
    btn.innerHTML = `${key} Sprint<span class="sprint-btn-sub">${val.label}</span>`;
    btn.onclick = () => { activeSprint = key; renderSprint(); };
    sel.appendChild(btn);
  });
  renderSprint();
}

function renderSprint() {
  // Update sprint selector buttons
  document.querySelectorAll('.sprint-btn').forEach((btn, i) => {
    btn.className = `sprint-btn${Object.keys(sprintData)[i] === activeSprint ? ' active' : ''}`;
  });

  const s = sprintData[activeSprint];

  // Stats
  document.getElementById('stat-grid').innerHTML = [
    {label:'Total Projects', val:s.totalProjects, color:COLORS.accent},
    {label:'On Track', val:s.onTrack, color:COLORS.green},
    {label:'At Risk', val:s.atRisk, color:COLORS.amber},
    {label:'Delayed', val:s.delayed, color:COLORS.red},
  ].map(st => `
    <div class="stat-card">
      <div class="stat-label">${st.label}</div>
      <div class="stat-val" style="color:${st.color}">${st.val}</div>
    </div>
  `).join('');

  // Projects
  const statusMap = {
    'on-track': {icon:'✓', color:COLORS.green, bg:'rgba(52,211,153,0.15)'},
    'at-risk':  {icon:'!', color:COLORS.amber, bg:'rgba(251,191,36,0.15)'},
    'delayed':  {icon:'✕', color:COLORS.red, bg:'rgba(255,170,170,0.15)'},
  };
  const progressColorMap = {'on-track':COLORS.green,'at-risk':COLORS.amber,'delayed':COLORS.red};

  document.getElementById('projects-grid').innerHTML = s.projects.map(p => {
    const st = statusMap[p.status];
    const badges = p.team.map(t => {
      const c = roleColors[t] || COLORS.muted;
      return `<span class="role-badge" style="background:${c}22;color:${c}">${t}</span>`;
    }).join('');
    return `
      <div class="proj-card">
        <div class="proj-top">
          <div><div class="proj-name">${p.name}</div><div class="proj-code">${p.code}</div></div>
          <div class="status-icon" style="background:${st.bg};color:${st.color}">${st.icon}</div>
        </div>
        <div class="phase-chip">${p.phase}</div>
        <div class="proj-progress-wrap">
          <div class="proj-progress-meta">
            <span class="proj-progress-label">Overall Progress</span>
            <span class="proj-progress-pct">${p.progress}%</span>
          </div>
          <div class="progress-bar-wrap" style="height:6px;">
            <div class="progress-bar-fill" style="width:${p.progress}%;background:${progressColorMap[p.status]}"></div>
          </div>
        </div>
        <div class="proj-deadline">📅 Deadline: ${p.deadline}</div>
        <div class="team-badges">${badges}</div>
      </div>
    `;
  }).join('');

  // Gantt
  const gcols = ['pi','w1','w24','w58'];
  const glabels = ['Project Init','Async Wk 1','Async Wks 2-4','Async Wks 5-8'];
  let ganttHTML = `<div class="gantt-header">
    <div class="gantt-col-label" style="color:${COLORS.muted}">Project</div>
    ${glabels.map((l,i) => `<div class="gantt-col-label" style="color:${GANTT_COLORS[i]}">${l}</div>`).join('')}
  </div>`;
  s.gantt.forEach(row => {
    ganttHTML += `<div class="gantt-row">
      <div class="gantt-code">${row.code}</div>
      ${gcols.map((col,ci) => `
        <div class="gantt-cell">
          ${row[col] > 0 ? `<div class="gantt-fill" style="width:${row[col]}%;background:${GANTT_COLORS[ci]}"></div>` : ''}
        </div>
      `).join('')}
    </div>`;
  });
  ganttHTML += `<div class="gantt-legend">${glabels.map((l,i) => `
    <div class="gantt-legend-item">
      <div class="gantt-legend-dot" style="background:${GANTT_COLORS[i]}"></div>
      <span class="gantt-legend-text">${l}</span>
    </div>`).join('')}</div>`;
  document.getElementById('gantt-chart').innerHTML = ganttHTML;

  // Bar chart
  if (barChart) barChart.destroy();
  const barCtx = document.getElementById('bar-chart').getContext('2d');
  barChart = new Chart(barCtx, {
    type:'bar',
    data:{
      labels: s.teamWorkload.map(t => t.name),
      datasets:[{data: s.teamWorkload.map(t => t.projects), backgroundColor: COLORS.accent, borderRadius:4}]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw} projects`}}},
      scales:{
        x:{ticks:{color:COLORS.muted,font:{size:11}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:COLORS.muted,font:{size:10}},grid:{color:COLORS.border},border:{display:false}}
      }
    }
  });

  // Pie chart
  if (pieChart) pieChart.destroy();
  const pieCtx = document.getElementById('pie-chart').getContext('2d');
  pieChart = new Chart(pieCtx, {
    type:'doughnut',
    data:{
      labels: s.phaseDistribution.map(p => p.name),
      datasets:[{data: s.phaseDistribution.map(p => p.value), backgroundColor: PIE_COLORS, borderWidth:0}]
    },
    options:{
      responsive:true, maintainAspectRatio:true, cutout:'60%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${Math.round(ctx.raw/s.totalProjects*100)}%`}}}
    }
  });
  document.getElementById('pie-legend').innerHTML = s.phaseDistribution.map((item,i) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <div style="width:10px;height:10px;border-radius:2px;background:${PIE_COLORS[i]};flex-shrink:0;"></div>
      <span style="font-size:11px;color:${COLORS.muted}">${item.name}: <strong style="color:${COLORS.text}">${Math.round(item.value/s.totalProjects*100)}%</strong></span>
    </div>`).join('');

  // Util cards
  document.getElementById('util-grid').innerHTML = s.teamWorkload.map(t => `
    <div class="util-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span class="util-name">${t.name}</span>
        <div class="util-dot"></div>
      </div>
      <div class="util-projects">${t.projects} <span class="util-label">projects</span></div>
      <div class="progress-bar-wrap" style="height:4px;"><div class="progress-bar-fill" style="width:100%;background:${COLORS.red}"></div></div>
      <div class="util-pct">100% utilized</div>
    </div>`).join('');

  // Deadlines
  document.getElementById('deadlines').innerHTML = s.upcomingDeadlines.map(d => `
    <div class="deadline-row">
      <div><div class="dl-code">${d.code}</div><div class="dl-name">${d.name}</div></div>
      <div><div class="dl-date">${d.deadline}</div><div class="dl-phase">${d.phase}</div></div>
    </div>`).join('');
}

// ── TAB SWITCHING ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.className = 'tab-btn' + (['kanban','dashboard'][i] === tab ? ' active' : '');
  });
  document.getElementById('panel-kanban').className = 'panel' + (tab==='kanban' ? ' active' : '');
  document.getElementById('panel-dashboard').className = 'panel' + (tab==='dashboard' ? ' active' : '');
}

// ── START ──
initKanban();
initDashboard();
</script>
